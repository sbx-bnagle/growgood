# ---------------------------------------------------------------------------
# Service definitions — single source of truth.
#
# Used by:
#   - _includes/other-services.html  (renders the "Other services" card grid)
#   - services.markdown              (renders the full service grid)
#
# To add, remove, or edit a service, change it HERE ONLY. Every service page
# picks the change up automatically. `id` must match the page's permalink so
# a page can exclude itself from its own "Other services" list.
# ---------------------------------------------------------------------------

- id: custom
  title: Custom Garden Design
  dest: custom
  color: purple
  link: Learn More
  blurb: >-
    We design gardens tailored to your space, your conditions, and your taste.
    You'll receive a planting plan that tells you exactly what to plant and
    where, along with the plants themselves, sourced and delivered to your
    door. Whether you have a small urban plot or a full backyard, we'll put
    together a design that works for you.

- id: consult
  title: Site Assessment & Consultation
  dest: consult
  color: gold
  link: Learn More
  blurb: >-
    Not sure what will grow in your space? We'll come out and take a look. We
    assess soil conditions, light exposure, and drainage to make sure the
    plants we recommend are the right fit for your site. A site visit takes the
    guesswork out of gardening and sets your garden up for long-term success.

- id: referral
  title: Contractor Referrals
  dest: referral
  color: red
  link: Learn More
  blurb: >-
    We design and supply. For installation, we work with a network of trusted
    local contractors we're happy to connect you with. If you'd prefer to
    install the garden yourself, we'll make sure you have everything you need
    to do it with confidence.

- id: community
  title: Community Projects
  dest: community
  color: green
  link: Learn More
  blurb: >-
    We work with neighborhood groups, park districts, block clubs, and schools
    to bring gardens to shared spaces. Whether you're planning a community
    planting, organizing a plant sale, or looking for someone to lead a
    workshop or give a talk, we're glad to help. Get in touch and tell us what
    you have in mind.
